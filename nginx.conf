# Configuration Nginx pour Bélier Intrepide
# Placer ce fichier dans /etc/nginx/sites-available/belier-intrepide ou adapter selon votre setup

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    
    # Rediriger HTTP vers HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;
    
    # SSL (adapter les chemins)
    ssl_certificate /etc/ssl/certs/your-cert.crt;
    ssl_certificate_key /etc/ssl/private/your-key.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    root /var/www/belier-intrepide/public;
    index index.php;
    
    # === LIMITE D'UPLOAD - CLÉS IMPORTANTES ===
    # Augmenter pour accepter des documents jusqu'à 50MB
    client_max_body_size 50M;  # Nginx - DOIT ÊTRE >= PHP post_max_size
    
    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;
    
    # Headers de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # === ROUTES LARAVEL ===
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php-fpm.sock;  # Adapter si besoin (ex: 127.0.0.1:9000)
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # === LIMITES FASTCGI POUR UPLOAD ===
        fastcgi_read_timeout 300;
        fastcgi_buffering off;
        fastcgi_request_buffering off;
    }
    
    location ~ /\.ht {
        deny all;
    }
    
    # === CACHE STATIQUE ===
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
    
    # === LOGS ===
    access_log /var/log/nginx/belier-intrepide-access.log;
    error_log /var/log/nginx/belier-intrepide-error.log;
}
